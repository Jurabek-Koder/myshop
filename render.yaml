# Render Blueprint: GitHub repoga ulaganda yoki "New Blueprint" orqali ishlatiladi.
# Bitta Web Service: frontend build + Node API, bir domen, /api va SPA birgalikda.
# Shundan keyin Render Dashboard orqali JWT, CORS va boshqa o‘zgaruvchilarni qo‘llang.

databases: []

services:
  - type: web
    name: myshop
    runtime: node
    plan: free
    region: frankfurt
    # Alohida static frontend bo‘lsa, build oldin: VITE_API_BASE_URL=https://backend-xxxx.onrender.com
    buildCommand: cd frontend && npm ci && npm run build && cd ../backend && npm ci
    startCommand: cd backend && NODE_ENV=production node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Tashkent
    # Doimiy disk (Render → service → Disks; odatda pullan reja) bo‘lsa, mountPath bilan bir xil:
    # Environment: MYSHOP_DATA_DIR=/data/myshop  (render disk mountPath)
    # PORT — Render o‘zi beradi. Maxfiy: JWT_ACCESS_SECRET, JWT_REFRESH_SECRET, CORS_ORIGINS, ...
