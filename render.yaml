services:
  # --- Backend (Express + SQLite) ---
  - type: web
    name: myshop-api
    runtime: node
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: NODE_VERSION
        value: "20"

      - key: TZ
        value: Asia/Tashkent

      - key: JWT_ACCESS_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      # Frontend URL (deploydan keyin qo‘shasan)
      - key: CORS_ORIGINS
        sync: false


  # --- Frontend (Vite build → CDN) ---
  - type: web
    name: myshop-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      # API URL (deploydan keyin qo‘shasan)
      - key: VITE_API_BASE_URL
        sync: false
